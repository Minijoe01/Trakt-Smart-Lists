[theme]
# Thème Aston Martin F1 2026 - Style Cinopsys : vert profond, uniforme
primaryColor = "#00A392" # Vert Aston principal
backgroundColor = "#052F2C" # Fond vert très sombre UNIFORME, pas de dégradé trop marqué
secondaryBackgroundColor = "rgba(8, 68, 63, 0.85)" # Fond des cartes : VERT ASTON TRANSPARENT (effet verre)
textColor = "#F0FAF8"
font = "sans serif"
base = "dark"

[server]
enableCORS = false
enableXsrfProtection = false
headless = true
